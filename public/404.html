<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Elizama</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--azul:#1A3560;--coral:#C0392B}
  body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0d2040 0%,#1A3560 60%,#2d1a10 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .card{background:white;border-radius:28px;padding:3rem 2.5rem;max-width:440px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.3)}
  .num{font-family:'Fraunces',serif;font-size:5rem;font-weight:900;color:var(--azul);line-height:1;opacity:.12;margin-bottom:-.5rem}
  .icon{font-size:3rem;margin-bottom:1rem}
  h1{font-family:'Fraunces',serif;font-size:1.75rem;font-weight:900;color:var(--azul);margin-bottom:.75rem}
  p{color:#6B7280;line-height:1.7;font-size:.95rem;margin-bottom:2rem}
  a.btn{background:var(--azul);color:white;border-radius:12px;padding:.85rem 1.5rem;font-size:.95rem;font-weight:600;text-decoration:none;display:block;transition:background .15s}
  a.btn:hover{background:#0f2340}
  .logo{margin-top:2rem;font-family:'Fraunces',serif;font-size:1.1rem;font-weight:900;color:#D1D5DB}
  .logo span{color:var(--coral);opacity:.6}
</style>
</head>
<body>
<div class="card">
  <div class="num">404</div>
  <div class="icon">🔍</div>
  <h1>Página não encontrada</h1>
  <p>A página que você procura não existe ou foi movida. Mas o amor pela Elizama ainda está aqui!</p>
  <a href="/" class="btn">← Voltar à campanha</a>
  <div class="logo">ELIZ<span>AMA</span></div>
</div>
</body>
</html>
