<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rifas & Eventos — Admin Elizama</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<script type="module">
import { guardAuth, api, fmt, badge, dataFmt, renderLayout, toast } from './_admin.js';
if (!guardAuth()) throw new Error('unauth');
renderLayout('Rifas, Eventos & Leilão', '<div id="root">Carregando…</div>');

const TIPOS = { rifa: '🎟️ Rifa', evento: '🏃 Evento', leilao: '🔨 Leilão' };

async function carregar() {
  const d = await api('alternativas');
  if (!d) return;

  document.getElementById('root').innerHTML = `
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
    <button class="btn btn-primary" onclick="abrirModal()">+ Novo Item</button>
  </div>
  <div class="card" style="padding:0">
    <table>
      <thead><tr><th>Tipo</th><th>Título</th><th>Valor</th><th>Vagas</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${d.length ? d.map(a => `
          <tr>
            <td style="font-size:.85rem">${TIPOS[a.tipo] || a.tipo}</td>
            <td style="font-weight:600">${a.titulo}</td>
            <td>${a.valor ? fmt(a.valor) : '—'}</td>
            <td style="font-size:.85rem">${a.vagas_total ? `${a.vagas_usadas}/${a.vagas_total}` : '—'}</td>
            <td style="font-size:.8rem;color:#6B7280">${a.data_evento ? dataFmt(a.data_evento) : '—'}</td>
            <td>${badge(a.status)}</td>
            <td class="actions">
              <button class="btn btn-sm btn-primary" onclick='editar(${JSON.stringify(a).replace(/'/g,"&#39;")})'>Editar</button>
              <button class="btn btn-sm btn-danger" onclick="excluir('${a.id}')">✕</button>
            </td>
          </tr>`).join('') : '<tr><td colspan="7" class="empty">Nenhum item cadastrado</td></tr>'}
      </tbody>
    </table>
  </div>
  <div id="modal"></div>`;
}

window.abrirModal = (a = null) => {
  document.getElementById('modal').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)fecharModal()">
    <div class="modal">
      <button class="modal-close" onclick="fecharModal()">✕</button>
      <h3>${a ? 'Editar' : 'Novo'} Item</h3>
      <input type="hidden" id="m-id" value="${a?.id||''}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Tipo *</label>
          <select id="m-tipo" ${a?'disabled':''}>
            <option value="rifa"   ${a?.tipo==='rifa'  ?'selected':''}>🎟️ Rifa</option>
            <option value="evento" ${a?.tipo==='evento'?'selected':''}>🏃 Evento</option>
            <option value="leilao" ${a?.tipo==='leilao'?'selected':''}>🔨 Leilão</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="m-status">
            <option value="ativo"    ${a?.status==='ativo'   ?'selected':''}>Ativo</option>
            <option value="em_breve" ${a?.status==='em_breve'?'selected':''}>Em breve</option>
            <option value="encerrado"${a?.status==='encerrado'?'selected':''}>Encerrado</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Título *</label><input id="m-titulo" value="${a?.titulo||''}"></div>
      <div class="form-group"><label>Descrição</label><textarea id="m-desc" rows="2" style="resize:vertical">${a?.descricao||''}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group"><label>Valor (R$)</label><input id="m-valor" type="number" step="0.01" value="${a?.valor||''}"></div>
        <div class="form-group"><label>Vagas totais</label><input id="m-vagas" type="number" value="${a?.vagas_total||''}"></div>
      </div>
      <div class="form-group"><label>Data do evento</label><input id="m-data" type="datetime-local" value="${a?.data_evento?a.data_evento.slice(0,16):''}"></div>
      <div class="form-group"><label>Link externo (opcional)</label><input id="m-link" value="${a?.link_externo||''}" placeholder="https://..."></div>
      <div style="display:flex;gap:.75rem;margin-top:1rem">
        <button class="btn btn-primary" style="flex:1" onclick="salvar()">Salvar</button>
        <button class="btn" style="background:#F3F4F6;flex:1" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>`;
};

window.editar = a => window.abrirModal(a);
window.fecharModal = () => document.getElementById('modal').innerHTML = '';

window.salvar = async () => {
  const id = document.getElementById('m-id').value;
  const body = {
    tipo:        document.getElementById('m-tipo').value,
    titulo:      document.getElementById('m-titulo').value,
    descricao:   document.getElementById('m-desc').value || null,
    valor:       document.getElementById('m-valor').value || null,
    vagas_total: document.getElementById('m-vagas').value || null,
    status:      document.getElementById('m-status').value,
    data_evento: document.getElementById('m-data').value || null,
    link_externo:document.getElementById('m-link').value || null,
    ...(id ? { id } : {})
  };
  if (!body.titulo) return toast('Título obrigatório.', false);
  const r = await api('alternativas', id ? 'PUT' : 'POST', body);
  if (r?.error) return toast(r.error, false);
  toast('Salvo!'); fecharModal(); carregar();
};

window.excluir = async id => {
  if (!confirm('Excluir este item?')) return;
  await api('alternativas', 'DELETE', { id });
  toast('Excluído!'); carregar();
};

carregar();
</script>
</body>
</html>
