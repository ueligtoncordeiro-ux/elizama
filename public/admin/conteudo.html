<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conteúdo — Admin Elizama</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<script type="module">
import { guardAuth, api, renderLayout, toast } from './_admin.js';
if (!guardAuth()) throw new Error('unauth');
renderLayout('Conteúdo & Configurações', '<div id="root">Carregando…</div>');

async function carregar() {
  const d = await api('conteudo');
  if (!d) return;

  const secoes = {};
  (d.conteudo || []).forEach(c => {
    if (!secoes[c.secao]) secoes[c.secao] = [];
    secoes[c.secao].push(c);
  });

  const cfgHtml = (d.configuracoes || []).map(c => `
    <div class="form-group" data-tipo="configuracao" data-chave="${c.chave}">
      <label>${c.descricao || c.chave}</label>
      <input class="cfg-input" value="${c.valor || ''}" data-chave="${c.chave}" data-tipo="configuracao">
    </div>`).join('');

  const secHtml = Object.entries(secoes).map(([secao, items]) => `
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${secao}</div>
      ${items.map(c => `
        <div class="form-group" data-chave="${c.chave}">
          <label>${c.chave.replace(/_/g,' ')}</label>
          ${c.corpo !== null ? `<textarea class="cnt-input" rows="3" data-chave="${c.chave}" style="resize:vertical">${c.corpo || ''}</textarea>` : ''}
          ${c.titulo !== null && c.chave.includes('titulo') ? `<input class="cnt-titulo" value="${c.titulo || ''}" data-chave="${c.chave}" placeholder="Título">` : ''}
        </div>`).join('')}
    </div>`).join('');

  const videoAtual = (d.configuracoes || []).find(c => c.chave === 'video_historia_url')?.valor || '';

  document.getElementById('root').innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start">
    <div>
      <div class="card">
        <div class="card-title">Configurações Gerais</div>
        ${cfgHtml}
        <button class="btn btn-primary" onclick="salvarConfigs()">Salvar Configurações</button>
      </div>

      <div class="card" style="margin-top:1rem">
        <div class="card-title">🎬 Vídeo da Seção História</div>
        <p style="font-size:.82rem;color:#6B7280;margin-bottom:1rem">Vídeo que aparece ao lado da história de Elizama. Máx 200MB. Substitui a imagem placeholder.</p>
        <div class="form-group">
          <label>Arquivo de vídeo (MP4 recomendado)</label>
          <input type="file" accept="video/*" onchange="uploadVideo(this)" style="width:100%;padding:.5rem;border:1px solid #E5E7EB;border-radius:8px">
          <div id="video-status" style="font-size:.78rem;margin-top:.4rem;font-weight:500">${videoAtual ? '✓ Vídeo atual configurado' : 'Nenhum vídeo cadastrado'}</div>
          <input type="hidden" id="video-url-input" value="${videoAtual}">
        </div>
        ${videoAtual ? `<video controls style="width:100%;border-radius:12px;margin-top:.5rem" preload="metadata"><source src="${videoAtual}">Vídeo atual</video>` : ''}
      </div>
    </div>
    <div>
      ${secHtml}
      <button class="btn btn-primary" style="width:100%" onclick="salvarConteudo()">Salvar Conteúdo</button>
    </div>
  </div>`;
}

window.uploadVideo = async (input) => {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 200 * 1024 * 1024) { toast('Vídeo muito grande (máx 200MB)', false); return; }

  const statusEl = document.getElementById('video-status');
  statusEl.textContent = 'Obtendo URL de upload…';
  statusEl.style.color = '#92400E';

  // 1. Pede URL assinada ao servidor
  const urlRes = await api('upload-url', 'POST', { nome: file.name });
  if (!urlRes?.signedUrl) {
    statusEl.textContent = '✗ Erro: ' + (urlRes?.error || 'Falha ao obter URL');
    statusEl.style.color = '#991B1B';
    return;
  }

  // 2. Upload direto browser → Supabase via XHR com progress
  statusEl.textContent = 'Enviando vídeo… 0%';

  await new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', urlRes.signedUrl);
    // Supabase signed upload: não setar Content-Type manualmente
    // e adicionar x-upsert para permitir sobrescrita
    xhr.setRequestHeader('x-upsert', 'true');

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        statusEl.textContent = `Enviando vídeo… ${pct}%`;
      }
    };

    xhr.onload = async () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        // 3. Salva a URL pública na configuração
        document.getElementById('video-url-input').value = urlRes.publicUrl;
        const r = await api('conteudo', 'PUT', {
          tipo: 'configuracao',
          chave: 'video_historia_url',
          valor: urlRes.publicUrl
        });
        if (r?.error) {
          statusEl.textContent = '✗ Upload ok, mas erro ao salvar: ' + r.error;
          statusEl.style.color = '#991B1B';
        } else {
          statusEl.textContent = '✓ Vídeo enviado e salvo com sucesso!';
          statusEl.style.color = '#065F46';
          toast('Vídeo da história atualizado!');
        }
      } else {
        // Mostra o corpo do erro para debug
        statusEl.textContent = `✗ Erro HTTP ${xhr.status}: ${xhr.responseText.slice(0, 120)}`;
        statusEl.style.color = '#991B1B';
      }
      resolve();
    };

    xhr.onerror = () => {
      statusEl.textContent = '✗ Falha na conexão durante o upload';
      statusEl.style.color = '#991B1B';
      resolve();
    };

    xhr.send(file);
  });
};

window.salvarConfigs = async () => {
  const inputs = document.querySelectorAll('.cfg-input');
  const erros = [];
  for (const input of inputs) {
    const r = await api('conteudo', 'PUT', { tipo: 'configuracao', chave: input.dataset.chave, valor: input.value });
    if (r?.error) erros.push(r.error);
  }
  erros.length ? toast('Erro: ' + erros[0], false) : toast('Configurações salvas!');
};

window.salvarConteudo = async () => {
  const inputs = document.querySelectorAll('.cnt-input, .cnt-titulo');
  const erros = [];
  for (const input of inputs) {
    const campo = input.classList.contains('cnt-titulo') ? { titulo: input.value } : { corpo: input.value };
    const r = await api('conteudo', 'PUT', { tipo: 'conteudo', chave: input.dataset.chave, ...campo });
    if (r?.error) erros.push(r.error);
  }
  erros.length ? toast('Erro: ' + erros[0], false) : toast('Conteúdo salvo!');
};

carregar();
</script>
</body>
</html>
