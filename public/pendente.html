<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doação pendente — Elizama</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --azul:#1A5BD9; --coral:#E8443A; --suave:#6B7280; --off-white:#F8F6F2; }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--off-white); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { background:white; border-radius:24px; padding:3rem 2.5rem; max-width:480px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,0.08); }
  .icon { font-size:3.5rem; margin-bottom:1rem; }
  h1 { font-family:'Fraunces',serif; font-size:2rem; font-weight:900; margin-bottom:0.75rem; color:var(--azul); }
  p { color: var(--suave); line-height:1.7; margin-bottom:1.5rem; }
  a.btn { display:inline-block; background:var(--azul); color:white; text-decoration:none; padding:0.85rem 2rem; border-radius:100px; font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⏳</div>
    <h1>Doação registrada</h1>
    <p>Recebemos sua intenção de doação. Se você escolheu boleto ou Pix, a confirmação pode levar até alguns minutos (ou até a compensação bancária, no caso de boleto).</p>
    <a href="/" class="btn">Voltar à campanha</a>
  </div>
</body>
</html>
